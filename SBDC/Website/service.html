<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        /* Portfolio Book Style */
        .service-chapter {
            margin-bottom: 80px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 20px;
            /* Yung parang kanto ng libro */
            aspect-ratio: 1 / 1;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .chapter-title {
            border-left: 5px solid #dc3545;
            padding-left: 15px;
            margin-bottom: 25px;
            font-weight: 800;
        }
    </style>
</head>

<body>

    <!-- Services Content -->
    <div class="container py-5">

        <!-- 1. General Construction Chapter -->
        <section class="service-chapter">
            <h3 class="chapter-title">General Construction</h3>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="site1.jpg"></div>
                <div class="gallery-item"><img src="site2.jpg"></div>
                <div class="gallery-item"><img src="site3.jpg"></div>
                <div class="gallery-item"><img src="site4.jpg"></div>
            </div>
        </section>

        <!-- 2. Architecture & Engineering Chapter -->
        <section class="service-chapter">
            <h3 class="chapter-title">Architecture & Engineering Design</h3>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="plan1.jpg"></div>
                <div class="gallery-item"><img src="plan2.jpg"></div>
                <div class="gallery-item"><img src="plan3.jpg"></div>
                <div class="gallery-item"><img src="plan4.jpg"></div>
            </div>
        </section>

        <!-- 3. Electrical & Mechanical Chapter -->
        <section class="service-chapter">
            <h3 class="chapter-title">Electrical & Mechanical Works</h3>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="elec1.jpg"></div>
                <div class="gallery-item"><img src="elec2.jpg"></div>
                <div class="gallery-item"><img src="elec3.jpg"></div>
                <div class="gallery-item"><img src="elec4.jpg"></div>
            </div>
        </section>

    </div>

</body>

</html>
